    const shell = document.getElementById('viewer-shell');
    const canvas = document.getElementById('view');
    const ctx = canvas.getContext('2d');
    let yaw = -0.72;
    let pitch = 0.48;
    let zoom = 4.2;
    let panX = 0;
    let panY = 0;
    let dolly = 0;
    let dragging = false;
    let dragMode = 'rotate';
    let zoomTargetActive = false;
    let lastX = 0;
    let lastY = 0;
    const scenePoints = [...systems.map(item => item.position), ...nuclei.map(item => item.position), ...meshes.flatMap(mesh => mesh.vertices)];
    const bounds = scenePoints.reduce((state, point) => ({
      minX: Math.min(state.minX, point.x),
      maxX: Math.max(state.maxX, point.x),
      minY: Math.min(state.minY, point.y),
      maxY: Math.max(state.maxY, point.y),
      minZ: Math.min(state.minZ, point.z),
      maxZ: Math.max(state.maxZ, point.z)
    }), { minX: Infinity, maxX: -Infinity, minY: Infinity, maxY: -Infinity, minZ: Infinity, maxZ: -Infinity });
    const sceneCenter = {
      x: (bounds.minX + bounds.maxX) * 0.5,
      y: (bounds.minY + bounds.maxY) * 0.5,
      z: (bounds.minZ + bounds.maxZ) * 0.5
    };
    const sceneExtent = Math.max(1, (bounds.maxX - bounds.minX) * 0.5, (bounds.maxY - bounds.minY) * 0.5, (bounds.maxZ - bounds.minZ) * 0.5);
    const baseScale = Math.max(4.8, 560 / Math.max(1, sceneExtent * 2));
    const distanceBase = Math.max(34, sceneExtent * 0.9);
    function resetView() { yaw = -0.72; pitch = 0.48; zoom = 4.2; panX = 0; panY = 0; dolly = 0; render(); }
    function applyZoom(deltaY) { const factor = Math.exp(deltaY * 0.0030); zoom = Math.max(0.01, Math.min(48.0, zoom * factor)); render(); }
    function centerPoint(point) { return { x: point.x - sceneCenter.x, y: point.y - sceneCenter.y, z: point.z - sceneCenter.z }; }
    function rotate(point) {
      const cy = Math.cos(yaw), sy = Math.sin(yaw);
      const cp = Math.cos(pitch), sp = Math.sin(pitch);
      const x1 = (point.x * cy) - (point.z * sy);
      const z1 = (point.x * sy) + (point.z * cy);
      const y2 = (point.y * cp) - (z1 * sp);
      const z2 = (point.y * sp) + (z1 * cp);
      return { x: x1, y: y2, z: z2 };
    }
    function project(point) {
      const distance = distanceBase + (62 * zoom);
      const shiftedZ = Math.min(point.z + dolly, distance - 2.0);
      const perspective = distance / (distance - shiftedZ);
      return { x: canvas.width / 2 + panX + (point.x * perspective * baseScale), y: canvas.height / 2 + panY + (point.y * perspective * baseScale), z: shiftedZ, scale: perspective };
    }
    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#07101b';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      const surfaces = [];
      for (const mesh of meshes) {
        const projectedVertices = mesh.vertices.map(centerPoint).map(rotate).map(project);
        for (const quad of mesh.quads) {
          const a = projectedVertices[quad[0]];
          const b = projectedVertices[quad[1]];
          const c = projectedVertices[quad[2]];
          const d = projectedVertices[quad[3]];
          const depth = (a.z + b.z + c.z + d.z) * 0.25;
          surfaces.push({ color: mesh.color, depth, points: [a, b, c, d] });
        }
      }
      surfaces.sort((left, right) => left.depth - right.depth);
      for (const surface of surfaces) {
        ctx.fillStyle = hexToRgba(surface.color, 0.18);
        ctx.strokeStyle = hexToRgba(surface.color, 0.72);
        ctx.lineWidth = 1.0;
        ctx.beginPath();
        ctx.moveTo(surface.points[0].x, surface.points[0].y);
        for (let index = 1; index < surface.points.length; index += 1) {
          ctx.lineTo(surface.points[index].x, surface.points[index].y);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      }
      const projectedLinks = links.map(link => ({
        start: project(rotate(centerPoint(link.start))),
        end: project(rotate(centerPoint(link.end))),
        gateType: link.gateType,
        depth: (rotate(centerPoint(link.start)).z + rotate(centerPoint(link.end)).z) * 0.5
      })).sort((left, right) => left.depth - right.depth);
      for (const link of projectedLinks) {
        ctx.strokeStyle = gateStroke(link.gateType);
        ctx.lineWidth = gateWidth(link.gateType);
        ctx.beginPath();
        ctx.moveTo(link.start.x, link.start.y);
        ctx.lineTo(link.end.x, link.end.y);
        ctx.stroke();
      }
      const projectedSystems = systems.map(item => ({ item, projected: project(rotate(centerPoint(item.position))) })).sort((left, right) => left.projected.z - right.projected.z);
      for (const entry of projectedSystems) {
        drawNetworkSystem(entry.projected, entry.item);
      }
      const projectedNuclei = nuclei.map(item => ({ projected: project(rotate(centerPoint(item.position))), label: item.label, color: item.color })).sort((left, right) => left.projected.z - right.projected.z);
      for (const item of projectedNuclei) {
        ctx.fillStyle = item.color;
        ctx.strokeStyle = 'rgba(255,255,255,0.92)';
        ctx.lineWidth = 1.0;
        ctx.beginPath();
        ctx.arc(item.projected.x, item.projected.y, Math.max(3.4, item.projected.scale * 3.6), 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = 'rgba(235,242,248,0.95)';
        ctx.font = '11px Consolas';
        ctx.fillText(item.label, item.projected.x + 6, item.projected.y - 6);
      }
    }
    function hexToRgba(hex, alpha) {
      const normalized = hex.replace('#', '');
      const r = parseInt(normalized.slice(0, 2), 16);
      const g = parseInt(normalized.slice(2, 4), 16);
      const b = parseInt(normalized.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }
    function gateStroke(gateType) {
      return gateType === 'Heavy' ? 'rgba(246, 189, 96, 0.82)' : gateType === 'Medium' ? 'rgba(158, 216, 255, 0.84)' : 'rgba(183, 240, 199, 0.60)';
    }
    function gateWidth(gateType) {
      return gateType === 'Heavy' ? 2.4 : gateType === 'Medium' ? 2.0 : 1.2;
    }
    function drawNetworkSystem(point, item) {
      const radius = Math.max(item.radius, point.scale * item.radius);
      ctx.fillStyle = item.glow;
      ctx.beginPath();
      ctx.arc(point.x, point.y, radius * 2.0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = item.fill;
      ctx.strokeStyle = item.stroke;
      ctx.lineWidth = 1.0;
      ctx.beginPath();
      ctx.arc(point.x, point.y, radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      if (item.label) {
        ctx.fillStyle = 'rgba(235,242,248,0.92)';
        ctx.font = '10px Consolas';
        ctx.fillText(item.label, point.x + 5, point.y - 5);
      }
    }
    canvas.addEventListener('pointerdown', event => { dragging = true; dragMode = (event.button === 2 || event.shiftKey) ? 'pan' : 'rotate'; lastX = event.clientX; lastY = event.clientY; canvas.classList.add('dragging'); });
    canvas.addEventListener('contextmenu', event => event.preventDefault());
    shell.addEventListener('pointerenter', () => { zoomTargetActive = true; });
    shell.addEventListener('pointerleave', () => { zoomTargetActive = false; });
    window.addEventListener('pointerup', () => { dragging = false; canvas.classList.remove('dragging'); });
    window.addEventListener('pointermove', event => { if (!dragging) return; const dx = event.clientX - lastX; const dy = event.clientY - lastY; lastX = event.clientX; lastY = event.clientY; if (dragMode === 'pan') { panX += dx; panY += dy; } else { yaw += dx * 0.008; pitch = Math.max(-1.35, Math.min(1.35, pitch + dy * 0.008)); } render(); });
    shell.addEventListener('wheel', event => { event.preventDefault(); applyZoom(event.deltaY); }, { passive: false });
    window.addEventListener('wheel', event => { if (!zoomTargetActive) return; event.preventDefault(); applyZoom(event.deltaY); }, { passive: false });
    window.addEventListener('keydown', event => { if (!zoomTargetActive) return; const moveStep = Math.max(1.6, sceneExtent * 0.05); if (event.key === 'w' || event.key === 'W') { dolly += moveStep; } else if (event.key === 's' || event.key === 'S') { dolly -= moveStep; } else { return; } event.preventDefault(); render(); });
    canvas.addEventListener('dblclick', () => resetView());
    render();
  </script>
