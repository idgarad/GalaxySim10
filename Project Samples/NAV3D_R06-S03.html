    window.addEventListener('keydown', event => { if (!zoomTargetActive) return; const moveStep = Math.max(1.2, maxSpan * 0.08); if (event.key === 'w' || event.key === 'W') { dolly += moveStep; } else if (event.key === 's' || event.key === 'S') { dolly -= moveStep; } else { return; } event.preventDefault(); render(); });
    canvas.addEventListener('dblclick', () => resetView());
    render();
  </script>
</body>
</html>
